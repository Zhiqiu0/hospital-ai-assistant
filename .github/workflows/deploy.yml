name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    # 只在 CI workflow 全绿后才执行部署
    # 配合 GitHub → Settings → Branches → main → Require status checks:
    #   "Frontend — Lint & Type Check" 和 "Backend — Lint & Syntax Check"
    environment: production

    steps:
      # checkout 必须 fetch-depth: 0，否则 sentry-cli set-commits --auto
      # 拿不到完整 git 历史，无法关联 release 与 commits
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 计算本次部署的 release 标识：用 git short SHA（如 a7873b2），
      # 同一份代码的 release 名字在 Sentry 里全局唯一，不会重复创建
      - name: Compute release version
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # 创建 Sentry release：自动关联本次 commits、finalize、标记 production 部署
      # 在 SSH deploy 之前执行：保证应用启动后上报 event 时 release object 已存在
      # 否则 event 上的 release tag 会"挂空"，关联不到 commits
      - name: Create Sentry release
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: mediscribe-s0
          SENTRY_PROJECT: python-fastapi
        with:
          environment: production
          version: ${{ steps.vars.outputs.sha }}

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        # SENTRY_RELEASE 通过 envs 字段穿透到 ssh 脚本里，
        # 再 export 给 docker compose，docker-compose.yml 用 ${SENTRY_RELEASE:-} 接收
        env:
          SENTRY_RELEASE: ${{ steps.vars.outputs.sha }}
        with:
          envs: SENTRY_RELEASE
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /app
            # 用 fetch + reset --hard 替代 git pull：
            # 1) 强一致——服务器是 production checkout，不应该有任何手动改动；
            #    git pull 遇到 working tree dirty 会拒绝，整个 deploy 卡死
            # 2) 任何被人手工改的文件都被强制覆盖回 origin/main 版本，单一真相源
            # 3) untracked files 不动（不会误删 logs/ 等运行时产物）
            git fetch origin main
            git reset --hard origin/main
            export SENTRY_RELEASE

            # 清理之前 deploy 中断留下的僵尸 container（名字前缀带随机 hash 的）
            # 例如 "c88ced3f53af_app-backend-1"——是 docker compose 重建中崩溃残留
            # 不影响健康容器（健康容器名字不带 hash 前缀）
            docker ps -a --format "{{.Names}}" 2>/dev/null \
              | grep -E "^[a-f0-9]{12}_app-" \
              | xargs -r docker rm -f 2>&1 || true

            # 镜像走 daocloud（library/*）+ 1ms.run（orthancteam）反代
            # 在 docker-compose.yml 与 Dockerfile 里写死前缀，不依赖 daemon mirror
            # （SSH user 无 root 权限改不了 /etc/docker/daemon.json）
            #
            # pull 加 || true 容错：1ms.run 偶尔把镜像下架（如 orthanc 25.6.2
            # 已被反代删除要付费），但本地 image 还在跑，不需要每次 deploy
            # 都重新拉。失败时降级到本地缓存，up -d 默认 --pull missing 不会
            # 二次尝试。代价：image 升级需要在 compose 文件里改 tag 触发重建。
            docker compose pull --ignore-buildable || echo "[deploy] WARN: 部分 image pull 失败，使用本地缓存继续"
            docker compose build backend frontend

            # 先单独起 db 等它 healthy（其他 service 都依赖 db；orthanc 需要 db
            # 里有 orthanc 库才能起来，不能让 orthanc 启动时 db 还没准备好）
            docker compose up -d db
            for i in $(seq 1 20); do
              db_h=$(docker inspect --format='{{.State.Health.Status}}' app-db-1 2>/dev/null || echo "starting")
              [ "$db_h" = "healthy" ] && break
              sleep 3
            done
            # db healthy 后立即建 orthanc 库（幂等，已存在则跳过）
            docker compose exec -T db psql -U medassist -d medassist -tc \
              "SELECT 1 FROM pg_database WHERE datname='orthanc'" | grep -q 1 \
              || docker compose exec -T db createdb -U medassist orthanc

            # 现在 db + orthanc 库都就绪，正常 up 全部 service
            # 不用 --wait（避免 orthanc 健康问题阻塞主流程 alembic / migrate）
            # 改成显式 up + 自己轮询 backend / frontend 关键服务 healthy
            docker compose up -d
            for i in $(seq 1 30); do
              backend_h=$(docker inspect --format='{{.State.Health.Status}}' app-backend-1 2>/dev/null || echo "starting")
              frontend_h=$(docker inspect --format='{{.State.Health.Status}}' app-frontend-1 2>/dev/null || echo "starting")
              echo "[deploy] poll $i: backend=$backend_h frontend=$frontend_h"
              if [ "$backend_h" = "healthy" ] && [ "$frontend_h" = "healthy" ]; then
                break
              fi
              sleep 5
            done
            if [ "$backend_h" != "healthy" ] || [ "$frontend_h" != "healthy" ]; then
              echo "[deploy] FATAL: backend / frontend 未在 150s 内 healthy"
              docker compose logs --tail=50 backend frontend
              exit 1
            fi
            # orthanc unhealthy 不 fatal（PACS 影像功能可单独修），仅 dump 日志便于排查
            orthanc_h=$(docker inspect --format='{{.State.Health.Status}}' app-orthanc-1 2>/dev/null || echo "missing")
            if [ "$orthanc_h" != "healthy" ]; then
              echo "[deploy] WARNING: orthanc=$orthanc_h（PACS 影像功能可能不可用）"
              docker compose logs --tail=40 orthanc 2>&1 | tail -40 || true
            fi
            # alembic 主迁移（迁移脚本在 alembic/versions 下）
            docker compose exec -T backend alembic upgrade head
            # 兜底：migrate.py 增量补字段 / 回填（schema_compat 已在启动时跑，
            # 这里再显式调一次保证一定执行 + 把 deploy 日志里能看到结果）
            docker compose exec -T backend python migrate.py
            # seed_config 维护质控规则与 Prompt 模板（重复执行幂等）
            docker compose exec -T backend python seed_config.py

            # ── 备份基础设施前置条件（幂等，每次部署都跑）─────────────────
            # /var/backups 默认 root:root，ubuntu 写不进去 → 备份脚本 mkdir 会 fail
            # /var/log/mediscribe-backup.log 同理（cron 用 >> 追加要可写）
            # 用 install -d 一次性建目录并 chown 给当前 ssh user（ubuntu）
            sudo install -d -o "$(id -u)" -g "$(id -g)" -m 750 /var/backups/mediscribe
            sudo touch /var/log/mediscribe-backup.log
            sudo chown "$(id -u):$(id -g)" /var/log/mediscribe-backup.log

            # ── 自动配置 crontab：每天凌晨 3 点跑 backup.sh 备份 PG + Orthanc + uploads
            # backup.sh 的 +x 已在 git 仓库里标记为 100755（git update-index --chmod=+x）
            # reset --hard 会保留 mode bit，不需要再 chmod
            # 检查 crontab 是否已含 backup.sh，没有则追加（幂等，不会重复加）
            BACKUP_CRON="0 3 * * * /app/backend/scripts/backup.sh >> /var/log/mediscribe-backup.log 2>&1"
            if ! crontab -l 2>/dev/null | grep -qF "/app/backend/scripts/backup.sh"; then
              echo "[deploy] 配置每日备份 crontab..."
              # 追加到现有 crontab（保留之前的）
              (crontab -l 2>/dev/null; echo "$BACKUP_CRON") | crontab -
              echo "[deploy] crontab 已配置：$BACKUP_CRON"
            fi

            echo "Deploy finished at $(date) release=$SENTRY_RELEASE"

      - name: Health check
        run: |
          sleep 15
          curl --fail --retry 3 --retry-delay 5 \
            "http://${{ secrets.SERVER_HOST }}/api/v1/health" \
            && echo "Health check passed" \
            || (echo "Health check failed" && exit 1)
