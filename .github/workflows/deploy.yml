name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    # 只在 CI workflow 全绿后才执行部署
    # 配合 GitHub → Settings → Branches → main → Require status checks:
    #   "Frontend — Lint & Type Check" 和 "Backend — Lint & Syntax Check"
    environment: production

    steps:
      # checkout 必须 fetch-depth: 0，否则 sentry-cli set-commits --auto
      # 拿不到完整 git 历史，无法关联 release 与 commits
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 计算本次部署的 release 标识：用 git short SHA（如 a7873b2），
      # 同一份代码的 release 名字在 Sentry 里全局唯一，不会重复创建
      - name: Compute release version
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # 创建 Sentry release：自动关联本次 commits、finalize、标记 production 部署
      # 在 SSH deploy 之前执行：保证应用启动后上报 event 时 release object 已存在
      # 否则 event 上的 release tag 会"挂空"，关联不到 commits
      - name: Create Sentry release
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: mediscribe-s0
          SENTRY_PROJECT: python-fastapi
        with:
          environment: production
          version: ${{ steps.vars.outputs.sha }}

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        # SENTRY_RELEASE 通过 envs 字段穿透到 ssh 脚本里，
        # 再 export 给 docker compose，docker-compose.yml 用 ${SENTRY_RELEASE:-} 接收
        env:
          SENTRY_RELEASE: ${{ steps.vars.outputs.sha }}
        with:
          envs: SENTRY_RELEASE
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /app
            git pull origin main
            export SENTRY_RELEASE

            # ── 自动配置 docker registry mirror ────────────────────────────
            # 关键认知：腾讯云 / 中科大 / 网易这种"半官方" mirror 只支持 library/*
            # （docker official images），不支持第三方 namespace（如 orthancteam/）。
            # 所以必须叠加 daocloud / 1ms / 1panel 这种通用反代，
            # docker daemon 会按顺序试每一个 mirror，直到找到镜像。
            #
            # 检查标识用 daocloud：旧版 daemon.json 没有，触发重写 + restart。
            if ! grep -q "daocloud\|1ms\|1panel" /etc/docker/daemon.json 2>/dev/null; then
              echo "[deploy] 配置 docker registry mirror（含第三方镜像代理）..."
              mkdir -p /etc/docker
              cat > /etc/docker/daemon.json <<'DAEMON_EOF'
            {
              "registry-mirrors": [
                "https://docker.m.daocloud.io",
                "https://docker.1ms.run",
                "https://docker.1panel.live",
                "https://mirror.ccs.tencentyun.com",
                "https://docker.mirrors.ustc.edu.cn",
                "https://hub-mirror.c.163.com"
              ]
            }
            DAEMON_EOF
              systemctl restart docker
              # 等 docker daemon 起来 + 重连所有 container
              sleep 15
              echo "[deploy] docker daemon 已重启，mirror 生效"
            fi

            # ── 拉镜像 + 构建 + 启动 ─────────────────────────────────────────
            # pull 走 mirror（不会再超时），ignore-buildable 跳过 backend/frontend
            # 这两个 build-only 的服务（它们不需要 pull 完整 image）
            docker compose pull --ignore-buildable
            docker compose build backend frontend
            docker compose up -d --wait
            # alembic 主迁移（迁移脚本在 alembic/versions 下）
            docker compose exec -T backend alembic upgrade head
            # 兜底：migrate.py 增量补字段 / 回填（schema_compat 已在启动时跑，
            # 这里再显式调一次保证一定执行 + 把 deploy 日志里能看到结果）
            docker compose exec -T backend python migrate.py
            # seed_config 维护质控规则与 Prompt 模板（重复执行幂等）
            docker compose exec -T backend python seed_config.py
            echo "Deploy finished at $(date) release=$SENTRY_RELEASE"

      - name: Health check
        run: |
          sleep 15
          curl --fail --retry 3 --retry-delay 5 \
            "http://${{ secrets.SERVER_HOST }}/api/v1/health" \
            && echo "Health check passed" \
            || (echo "Health check failed" && exit 1)
