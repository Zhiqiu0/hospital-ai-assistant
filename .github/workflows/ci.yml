name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # 用 npm install 而不是 npm ci：esbuild 的跨平台 optional dependencies
        # 在 Linux runner 上用 npm ci 会报 EBADPLATFORM；npm install 能正确
        # 跳过非当前平台的 optional dep。
        run: npm install --no-audit --no-fund

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Unit tests (vitest)
        # 前端有 10 个 *.test.ts(x)（含病历写入/QC 字段契约等核心逻辑），
        # 之前 CI 从不执行，等于对发版零拦截。这里补上（test = vitest run，非 watch）。
        run: npm run test

      - name: Build
        run: npm run build

  backend:
    name: Backend — Lint & Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check (all Python files)
        run: |
          find app -name "*.py" | xargs python -m py_compile
          echo "All Python files passed syntax check"

      - name: Ruff lint
        run: |
          pip install ruff
          ruff check app --select E,F,W --ignore E501

      - name: Alembic 单头检查
        # 迁移链必须只有 1 个 head：多 head(两条迁移从同一父节点分叉)会让
        # `alembic upgrade head` 报错、部署时才炸。这里不连 DB、只读迁移文件的
        # revision 图，几百毫秒就能挡住多 head 合并事故。
        # 注：完整的"迁移能在干净库上 upgrade"门禁需要本项目 schema 先做成
        # migration-first(目前是 migrations + migrate.py + schema_compat + create_all
        # 四通道混管)，属更大的重构，暂不在 CI 做。
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
        run: |
          heads=$(python -m alembic heads 2>/dev/null | grep -c "(head)")
          echo "alembic heads count = $heads"
          test "$heads" -eq 1 || { echo "::error::检测到多个 alembic head，迁移链分叉，需先合并"; exit 1; }

      - name: Run tests
        # Settings 在 import 时校验 DATABASE_URL/SECRET_KEY；CI 没有 .env，
        # 用假值让 Settings 初始化通过（实际测试用 conftest 内的 sqlite 内存库）
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
        # pytest-timeout：单测试卡 60s 直接 fail 并打印 stack trace，
        # 让 CI 不再"无限挂等" runner timeout，hang 时能立刻定位是哪个测试
        # step timeout-minutes：保险——整个 step 最长 5 分钟（本地仅 5 秒）
        timeout-minutes: 5
        run: |
          pip install pytest-timeout
          pytest tests/ -v --timeout=60 --timeout-method=thread
