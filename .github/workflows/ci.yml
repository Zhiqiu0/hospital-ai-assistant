name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # 用 npm install 而不是 npm ci：esbuild 的跨平台 optional dependencies
        # 在 Linux runner 上用 npm ci 会报 EBADPLATFORM；npm install 能正确
        # 跳过非当前平台的 optional dep。
        run: npm install --no-audit --no-fund

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Build
        run: npm run build

  backend:
    name: Backend — Lint & Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check (all Python files)
        run: |
          find app -name "*.py" | xargs python -m py_compile
          echo "All Python files passed syntax check"

      - name: Ruff lint
        run: |
          pip install ruff
          ruff check app --select E,F,W --ignore E501

      - name: Run tests
        # Settings 在 import 时校验 DATABASE_URL/SECRET_KEY；CI 没有 .env，
        # 用假值让 Settings 初始化通过（实际测试用 conftest 内的 sqlite 内存库）
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          SECRET_KEY: ci-test-secret-key-not-for-production
        run: pytest tests/ -v
