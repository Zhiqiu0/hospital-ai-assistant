# WebSocket 升级头条件 map：
#   客户端带 Upgrade 头（真 WebSocket 握手）→ Connection: upgrade
#   客户端没带（普通 HTTP/HTTP2 请求）→ Connection: close（不触发协议升级）
#
# 必须用 map 而不是写死 `proxy_set_header Connection "upgrade"`——
# HTTP/2 协议规范（RFC 7540 §8.1.2.2）禁止 Connection 头出现，
# 写死会让 HTTP/2 客户端在多路复用同一 TLS 连接时撞协议错误，
# 进而影响 connection 上其他正常请求 → ERR_CONNECTION_CLOSED 全站异常
# （2026-05-02 PR#36 踩过此坑，PR#37 紧急回滚后用本 map 重做）。
# 本指令位于 http 块顶层（conf.d/*.conf 被 main nginx.conf 的 http 块 include）。
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── gzip 压缩（2026-07-13）──────────────────────────────────────────────
# 前端最大单文件 vendor-antd ~1.36MB 此前一直原样传输，在当前 200M 大带宽
# 服务器上无感；迁移到 5M 小带宽机器后首屏会拖到 ~3s，开启后压到 ~600KB。
# 本指令位于 http 块顶层，对下方所有 server（主站/paiju/8443）统一生效。
#
# ⚠️ gzip_types 绝不能加 text/event-stream —— gzip 模块有自己的输出缓冲，
# 会把 SSE 流式响应（quick-generate 等 4 个端点）整段憋住到结束才发，
# 等效于把那些 location 里的 proxy_buffering off 全部作废。
# SSE 响应的 Content-Type 是 text/event-stream，不在下方列表内即天然豁免；
# WebSocket（voice-stream / game）走协议升级，gzip 不参与，同样不受影响。
gzip on;
gzip_comp_level 5;       # 1-9：5 是压缩率与 CPU 的平衡点，2 核小机不宜开更高
gzip_min_length 1024;    # <1KB 的响应不压缩（省不了几个字节还多一次 CPU）
gzip_vary on;            # 响应加 Vary: Accept-Encoding，防中间缓存串包
gzip_proxied any;        # 反代回来的响应（/api/ 的 JSON）也参与压缩
gzip_types
    text/css
    text/plain
    text/javascript
    application/javascript
    application/json
    image/svg+xml;

# HTTP → HTTPS 重定向（/health.txt 用于 docker healthcheck，不做跳转）
server {
    listen 80;
    server_name mediscribe.cn www.mediscribe.cn;

    location = /health.txt {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://mediscribe.cn$request_uri;
    }
}

# www HTTPS → 重定向到非 www
server {
    listen 443 ssl;
    http2 on;
    server_name www.mediscribe.cn;

    ssl_certificate /etc/letsencrypt/live/mediscribe.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mediscribe.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    return 301 https://mediscribe.cn$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl;
    http2 on;
    server_name mediscribe.cn;

    ssl_certificate /etc/letsencrypt/live/mediscribe.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mediscribe.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    # ── HTTP/2 keepalive 调优（2026-05-03 修正）─────────────────────────────
    # 上一版（a02363a）把 keepalive_timeout 从 75s 拉到 600s，本意是覆盖医生
    # 操作间隙避免"撞 server-side close → ERR_CONNECTION_CLOSED"。但 2026-05-02
    # 换 IP 后 ERR_CONNECTION_CLOSED 重新冒头，服务器侧零异常（无重启 / 无 OOM
    # / nginx access.log 里压根没那条失败请求）—— 真因是浏览器 socket pool
    # 缓存了旧 IP（122.51.4.37）的 HTTP/2 connection，DNS 切到新 IP 后浏览器
    # 仍优先复用旧 connection，撞到旧 IP 的 ghost server 就 reset。600s 让
    # 浏览器把 stale connection 留得更久，反而加重命中概率。
    # 现回归业界标准 75s：浏览器 cache 寿命短，少一点 stale 命中；操作间隙
    # 超过 75s 浏览器自动建新 connection，对交互体验透明。
    keepalive_timeout 75;
    keepalive_requests 10000;
    # 注：未配置 client_max_body_size，走 nginx 默认 1M。
    # 当前 ENABLE_AUDIO_UPLOAD=false，前端不会触发音频文件上传；上线时把开关切回
    # true 的同时，需要在此设合理上限（建议 200m，覆盖 2 小时 128kbps 录音 + 4 倍
    # 余量），并配套 uploads/ 目录的归档/清理策略。两件事一起做，避免漂移。

    # HSTS：浏览器一旦访问过 https 版本，未来 2 年内自动把 http://mediscribe.cn
    # 转成 https://，绕开未备案 80 端口被 DNSPod 拦截的问题。
    # 不加 preload 子句——避免提前加入浏览器 preload list（撤销困难）。
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── 安全响应头（2026-06-11 安全加固，与后端 SecurityHeadersMiddleware 配套）──
    # 后端中间件只覆盖被代理的 /api/*，SPA 静态页（index.html/JS/CSS）由这里补齐。
    # X-Frame-Options 用 SAMEORIGIN 而非 DENY：给将来 HIS 同源 iframe 嵌入留余地。
    # 不加 CSP：antd 的 cssinjs 运行时内联样式需要 unsafe-inline，收益打折且易误伤，
    # 待前端样式方案稳定后再评估。
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /usr/share/nginx/html;
    index index.html;

    # 上传体积上限：nginx 默认 client_max_body_size 仅 1M，会把 DICOM 压缩包 /
    # 检验 PDF / 长录音音频（pacs、lab-reports、ai_voice 上传端点，走下方 /api/ 通配）
    # 直接 413 拒掉，且不进后端 error.log——医生看到"上传就失败"、服务端却零异常。
    # 设 100M 给影像留足余量（后端各上传接口另有自己的类型/大小校验兜底）。
    client_max_body_size 100m;

    # ──「还没感觉」酒局游戏小程序联机后端（独立副项目，2026-07-14）──────────
    # 与医院项目完全隔离：独立进程（宿主机 172.17.0.1:8012，systemd 单元 notdrunk，
    # 代码在 /home/ubuntu/notdrunk），仅借用本域名的 443 和证书——小程序合法域名
    # 只认 443 端口，没得选。/game/ 前缀由 proxy_pass 结尾斜杠剥掉。
    # WebSocket 说明：wx.connectSocket 是原生连接，ALPN 走 http/1.1，不受本块
    # http2 影响（8443 块注释里的坑只影响浏览器复用 h2 连接的场景）；
    # Connection 头必须用顶部 map 的 $connection_upgrade（PR#36 教训）。
    location /game/ {
        proxy_pass http://172.17.0.1:8012/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 牌局 WebSocket 长连接：客户端 15s 心跳，120s 读超时余量充足
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # 前端路由（React Router）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # FastAPI 文档
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://backend:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE 流式接口（单独配置 proxy_buffering off，仅限这 4 个端点）
    # 普通 API 接口不能用 proxy_buffering off，否则 HTTP/2 帧管理冲突 → ERR_CONNECTION_RESET
    location ~ ^/api/v1/ai/(quick-generate|quick-supplement|quick-continue|quick-polish)(/|$) {
        proxy_pass http://backend:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # AI 重型推理接口（voice-structure / quick-qc 等单次 LLM 调用，耗时可能超 120s）
    location ~ ^/api/v1/ai/(voice-structure|quick-qc)(/|$) {
        proxy_pass http://backend:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }

    # 注：voice-stream WebSocket 已经迁到独立 8443 端口（见文件末尾 server 块）。
    # 主站 443 保持 HTTP/2 多路复用避免 keepalive 抖动，但 nginx 1.29 对 HTTP/2
    # WebSocket（RFC 8441）兼容性差导致 wss 在主站升级失败。两边解耦后互不干扰。

    # 普通 API 端点（包含 encounters/quick-start 等所有非 SSE 接口）
    location /api/ {
        proxy_pass http://backend:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
    }
}

# ════════════════════════════════════════════════════════════════════════
# WebSocket 实时语音转写专用 server（2026-05-02 PR#40 引入）
#
# 设计动机：
#   nginx 1.29.8 对 HTTP/2 WebSocket（RFC 8441 Extended CONNECT）兼容性差，
#   浏览器（特别是 Edge）在主站 HTTP/2 connection 上做 wss 升级会失败 → 404。
#   修法走"端口隔离"：主站 443 保留 HTTP/2 不动（避免 keepalive 抖动），
#   wss 走独立 8443 端口、强制 HTTP/1.1，浏览器在新端口建独立 TCP +
#   HTTP/1.1 升级，握手稳定。
#
# 隔离性：本 server 块跟 443 主站完全独立，加错只影响 wss 不影响主站。
# Lighthouse 防火墙需同步开放 8443 入站（已在控制台配置）。
# ════════════════════════════════════════════════════════════════════════
server {
    listen 8443 ssl;
    # 故意不写 `http2 on` —— 强制 HTTP/1.1 让 WebSocket Upgrade 标准路径生效
    server_name mediscribe.cn;

    # 复用主站同一份 letsencrypt 证书（域名一致，无需额外签发）
    ssl_certificate /etc/letsencrypt/live/mediscribe.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mediscribe.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # 只接受 voice-stream 路径，其他 URL 一律 404 避免误用
    location ~ ^/api/v1/ai/voice-stream(/|$) {
        proxy_pass http://backend:8010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 长连接：医生说话间歇可能数十秒无数据，按业务上限放宽到 10 分钟
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        return 404;
    }
}

# ════════════════════════════════════════════════════════════════════════
# paiju.mediscribe.cn — 独立副项目「牌局记账」小程序后端入口（2026-07-12）
#
# 本块与医院项目完全隔离：独立证书、独立后端（宿主机 docker 网桥
# 172.17.0.1:8020 上的 paiju-backend 容器，代码/数据/部署都在
# /home/ubuntu/paiju，仓库 Zhiqiu0/paiju-ledger）。仅因 443 端口只有
# 一个入口 nginx，故转发规则挂在这里；增删本块不影响主站任何行为。
# ════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name paiju.mediscribe.cn;
    return 301 https://paiju.mediscribe.cn$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name paiju.mediscribe.cn;

    ssl_certificate /etc/letsencrypt/live/paiju.mediscribe.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/paiju.mediscribe.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 头像上传上限 5m（后端另有 2m 校验兜底）
    client_max_body_size 5m;

    location / {
        proxy_pass http://172.17.0.1:8020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 60s;
    }
}
