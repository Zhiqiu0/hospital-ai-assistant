# WebSocket 升级头条件 map：
#   客户端带 Upgrade 头（真 WebSocket 握手）→ Connection: upgrade
#   客户端没带（普通 HTTP/HTTP2 请求）→ Connection: close（不触发协议升级）
#
# 必须用 map 而不是写死 `proxy_set_header Connection "upgrade"`——
# HTTP/2 协议规范（RFC 7540 §8.1.2.2）禁止 Connection 头出现，
# 写死会让 HTTP/2 客户端在多路复用同一 TLS 连接时撞协议错误，
# 进而影响 connection 上其他正常请求 → ERR_CONNECTION_CLOSED 全站异常
# （2026-05-02 PR#36 踩过此坑，PR#37 紧急回滚后用本 map 重做）。
# 本指令位于 http 块顶层（conf.d/*.conf 被 main nginx.conf 的 http 块 include）。
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP → HTTPS 重定向（/health.txt 用于 docker healthcheck，不做跳转）
server {
    listen 80;
    server_name mediscribe.cn www.mediscribe.cn;

    location = /health.txt {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://mediscribe.cn$request_uri;
    }
}

# www HTTPS → 重定向到非 www
server {
    listen 443 ssl;
    server_name www.mediscribe.cn;

    ssl_certificate /etc/letsencrypt/live/mediscribe.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mediscribe.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    return 301 https://mediscribe.cn$request_uri;
}

# HTTPS 主配置
#
# ★ 不启用 HTTP/2 的设计取舍（2026-05-02 PR#39）：
#   nginx 1.29.8 不支持 RFC 8441（HTTP/2 上的 WebSocket Extended CONNECT）。
#   而浏览器（尤其 Edge）对同 origin 的 wss:// 请求默认在已有 HTTP/2 connection
#   上发起升级，nginx 拒收返回 404 → WebSocket 永远失败。即使浏览器理论上应该
#   fallback 到 HTTP/1.1，Edge 实测不会。
#   副带好处：HTTP/1.1 没有"connection pool 缓存死 socket → 用户首访 ERR_
#   CONNECTION_CLOSED 必须刷几次"的 deploy 副作用。
#   性能损失：mediscribe.cn 主页静态资源很少（一个 JS、一个 CSS），HTTP/2
#   多路复用收益微弱，可接受。
#   未来若 nginx 支持 RFC 8441 + 实测 Edge 兼容良好，再恢复 http2 on。
server {
    listen 443 ssl;
    server_name mediscribe.cn;

    ssl_certificate /etc/letsencrypt/live/mediscribe.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mediscribe.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    keepalive_timeout 75;
    keepalive_requests 1000;

    # HSTS：浏览器一旦访问过 https 版本，未来 2 年内自动把 http://mediscribe.cn
    # 转成 https://，绕开未备案 80 端口被 DNSPod 拦截的问题。
    # 不加 preload 子句——避免提前加入浏览器 preload list（撤销困难）。
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    root /usr/share/nginx/html;
    index index.html;

    # 前端路由（React Router）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # FastAPI 文档
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://backend:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE 流式接口（单独配置 proxy_buffering off，仅限这 4 个端点）
    # 普通 API 接口不能用 proxy_buffering off，否则 HTTP/2 帧管理冲突 → ERR_CONNECTION_RESET
    location ~ ^/api/v1/ai/(quick-generate|quick-supplement|quick-continue|quick-polish)(/|$) {
        proxy_pass http://backend:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # AI 重型推理接口（voice-structure / quick-qc 等单次 LLM 调用，耗时可能超 120s）
    location ~ ^/api/v1/ai/(voice-structure|quick-qc)(/|$) {
        proxy_pass http://backend:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }

    # WebSocket：实时语音转写代理（/api/v1/ai/voice-stream）
    # 必须放在下方 /api/ 兜底之前 — 兜底里 `Connection ''` 会清空升级头 → 404
    # Connection 头用 $connection_upgrade 变量（顶层 map 定义），仅在客户端真带 Upgrade
    # 时设 "upgrade"；普通 HTTP/2 请求误中此 location 时设 "close"，避开 HTTP/2 协议
    # 禁止显式 Connection 头的限制。
    location ~ ^/api/v1/ai/voice-stream(/|$) {
        proxy_pass http://backend:8010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 长连接：医生说话间歇可能数十秒无数据，按业务上限放宽到 10 分钟
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # 普通 API 端点（包含 encounters/quick-start 等所有非 SSE 接口）
    location /api/ {
        proxy_pass http://backend:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
    }
}
