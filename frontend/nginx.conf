# HTTP → HTTPS 重定向（/health.txt 用于 docker healthcheck，不做跳转）
server {
    listen 80;
    server_name mediscribe.cn www.mediscribe.cn;

    location = /health.txt {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://mediscribe.cn$request_uri;
    }
}

# www HTTPS → 重定向到非 www
server {
    listen 443 ssl;
    http2 on;
    server_name www.mediscribe.cn;

    ssl_certificate /etc/letsencrypt/live/mediscribe.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mediscribe.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    return 301 https://mediscribe.cn$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl;
    http2 on;
    server_name mediscribe.cn;

    ssl_certificate /etc/letsencrypt/live/mediscribe.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mediscribe.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    keepalive_timeout 75;
    keepalive_requests 1000;

    # HSTS：浏览器一旦访问过 https 版本，未来 2 年内自动把 http://mediscribe.cn
    # 转成 https://，绕开未备案 80 端口被 DNSPod 拦截的问题。
    # 不加 preload 子句——避免提前加入浏览器 preload list（撤销困难）。
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    root /usr/share/nginx/html;
    index index.html;

    # 前端路由（React Router）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # FastAPI 文档
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://backend:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE 流式接口（单独配置 proxy_buffering off，仅限这 4 个端点）
    # 普通 API 接口不能用 proxy_buffering off，否则 HTTP/2 帧管理冲突 → ERR_CONNECTION_RESET
    location ~ ^/api/v1/ai/(quick-generate|quick-supplement|quick-continue|quick-polish)(/|$) {
        proxy_pass http://backend:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # AI 重型推理接口（voice-structure / quick-qc 等单次 LLM 调用，耗时可能超 120s）
    location ~ ^/api/v1/ai/(voice-structure|quick-qc)(/|$) {
        proxy_pass http://backend:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }

    # WebSocket：实时语音转写代理（/api/v1/ai/voice-stream）
    # 必须独立配置，且必须放在下方 /api/ 兜底之前——否则会被兜底的
    # `Connection ''` 把握手头清空，FastAPI 收到的不再是合法 WebSocket 升级
    # 请求，路由不匹配返回 404（生产 bug：2026-05-02 修）。
    # Upgrade / Connection 必须显式透传给后端 ASGI。
    location ~ ^/api/v1/ai/voice-stream(/|$) {
        proxy_pass http://backend:8010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 长连接：医生说话间歇可能数十秒无数据，按业务上限放宽到 10 分钟
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # 普通 API 端点（包含 encounters/quick-start 等所有非 SSE 接口）
    location /api/ {
        proxy_pass http://backend:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
    }
}
