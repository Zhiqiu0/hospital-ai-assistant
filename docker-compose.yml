# 镜像源说明：
#   生产服务器在国内，到 registry-1.docker.io 网络持续超时，
#   且 SSH 部署用户无 root 权限不能改 /etc/docker/daemon.json 全局 mirror。
#   解决方案：所有 image 都加 docker.m.daocloud.io 前缀，绕开 docker hub。
#   DaoCloud 反代支持任意 namespace（library/* + 第三方），稳定性较好。
#   本地开发也可用——daocloud 反代的 image 与官方完全等价。
services:
  db:
    image: docker.m.daocloud.io/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: medassist
      POSTGRES_USER: medassist
      # `:?required` 让 docker compose up 在 .env 缺 DB_PASSWORD 时立即报错，
      # 不再静默 fallback 到公网仓库可见的默认密码。
      POSTGRES_PASSWORD: ${DB_PASSWORD:?required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 容器首次初始化时自动建 orthanc 数据库（已有数据卷的环境不会跑这个，需手动 CREATE DATABASE）
      - ./backend/db_init:/docker-entrypoint-initdb.d:ro
    # 端口仅绑本机，禁止公网直连——backend / orthanc 容器走 docker 内网访问，
    # 本机调试用 psql 仍可（127.0.0.1:5432 通），杜绝 5432 被互联网扫描入侵
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medassist -d medassist"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ───── Redis 缓存（PACS 缩略图加速 + 后续通用缓存）───────
  # 单 study 537 帧每张 0.6s 走 Orthanc 渲染 → 总计 5+ 分钟才出齐缩略图
  # 接入 Redis 后第一次走 Orthanc，后续命中缓存 < 5ms，缩略图列表秒开
  # 也为后续 session / 限流 / 异步任务队列预留通用缓存层
  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    restart: unless-stopped
    # 仅本机绑定——backend 容器走 docker 内网；外部不能直连 6379
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    # PACS 缩略图最大占内存 256MB，超出 LRU 自动驱逐最久没用的
    # save "" 关闭 RDB 持久化（缓存丢了能重新生成，不需要持久化拖慢写入）
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ───── Orthanc DICOM 服务器（R1 迁移）─────────────────────
  # 替代 pacs.py 的本地 DICOM 处理：负责 DICOM 文件存储、Study/Series 索引、
  # 缩略图渲染、窗位窗宽、DIMSE 直传等。FastAPI 通过 DICOMweb HTTP 调用。
  orthanc:
    # daocloud 有第三方镜像白名单，orthancteam 不在内（issue #2328）
    # 改用 docker.1ms.run（无白名单，支持任意 namespace）
    image: docker.1ms.run/orthancteam/orthanc:25.6.2
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    # 仅本机绑定——backend 容器通过 docker 内网（http://orthanc:8042）访问；
    # 4242 DIMSE 端口同理。如果 CT 机要直推，需要单独走 SSH 隧道或 VPN，
    # 不能让 Orthanc 在公网裸奔（凭证用 Basic Auth，强度不够）。
    ports:
      - "127.0.0.1:4242:4242"
      - "127.0.0.1:8042:8042"
    # orthanc 25+ 支持 ORTHANC__SECTION__KEY 环境变量覆盖 JSON 配置。
    # PostgreSQL 密码 + RegisteredUsers HTTP Basic Auth 凭证一律走 env 注入，
    # 不在 orthanc.json 里硬编码（防止公网仓库泄露默认凭证）。
    environment:
      ORTHANC__POSTGRESQL__USERNAME: ${DB_USER:-medassist}
      ORTHANC__POSTGRESQL__PASSWORD: ${DB_PASSWORD:?required}
      # ⚠️ orthanc 25 entrypoint 把 ORTHANC__SECTION__KEY 转 JSON 时会把
      # KEY 段做 PascalCase 转换：MEDISCRIBE → Mediscribe，
      # 所以 RegisteredUsers 里实际用户名是 "Mediscribe"（首字母大写）。
      # backend 的 ORTHANC_USERNAME 必须用 "Mediscribe" 才能 Basic Auth 通过。
      ORTHANC__REGISTERED_USERS__MEDISCRIBE: ${ORTHANC_PASSWORD:?required}
      # CORS 收紧到实际前端域名——之前是 "*"，配合 Authorization header 让任何
      # 第三方网站脚本带凭证访问 Orthanc API。生产改为前端域名 allowlist。
      ORTHANC__HTTP_HEADERS__ACCESS-CONTROL-ALLOW-ORIGIN: ${ALLOWED_ORIGINS:-https://mediscribe.cn}
    volumes:
      - ./backend/orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
      - orthanc_storage:/var/lib/orthanc/db
    healthcheck:
      # orthanc 25 镜像里没装 wget / curl，原来的 wget healthcheck 永远失败
      # （进 unhealthy 但服务实际正常，docker compose ps 误报）。
      # 改用 bash /dev/tcp 做 TCP 端口探测：进程在 listen 8042 = 服务存活，
      # 不需要密码、不依赖外部工具，镜像里 bash 一直在。
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8042'"]
      interval: 10s
      timeout: 5s
      retries: 12
      # 首次启动 orthanc 需要建索引、扫 db、初始化 DICOM web 端点；
      # 在低配服务器上可能 60s 都不够，给 90s 充裕预热
      start_period: 90s

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8010/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 15s
    environment:
      DATABASE_URL: postgresql+asyncpg://medassist:${DB_PASSWORD:?required}@db:5432/medassist
      SECRET_KEY: ${SECRET_KEY:?required}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      ALIYUN_API_KEY: ${ALIYUN_API_KEY:-}
      # Orthanc 三件套显式从 .env 注入（容器内必须用服务名 orthanc 访问，
      # 不能用 localhost；密码与 ORTHANC__REGISTERED_USERS__MEDISCRIBE 同源，
      # 一改两改）
      # ⚠️ ORTHANC_USERNAME 默认值必须是 "Mediscribe"（PascalCase）：
      # orthanc 25 entrypoint 把 env key MEDISCRIBE → Mediscribe，
      # backend 用小写 "mediscribe" 走 Basic Auth 会被 401。
      ORTHANC_BASE_URL: ${ORTHANC_BASE_URL:-http://orthanc:8042}
      ORTHANC_USERNAME: ${ORTHANC_USERNAME:-Mediscribe}
      ORTHANC_PASSWORD: ${ORTHANC_PASSWORD:?required}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      APP_DEBUG: "false"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://mediscribe.cn,http://localhost}
      # Sentry 错误监控：DSN/环境/性能采样率从 .env 读，留空时自动跳过初始化
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.05}
      # release 标识：CI deploy 时由 deploy.yml 注入 git short SHA
      # 本地手动 docker compose up 不传，event 没有 release tag 但不影响功能
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
    volumes:
      - uploads_data:/app/uploads
      - /app/logs:/app/logs
    ports:
      - "8010:8010"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        # backend 健康后再启动 nginx，避免首次请求 502/连接关闭
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health.txt || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 10s
    ports:
      - "80:80"
      - "443:443"
      # 8443: WebSocket 实时语音转写专用入口（HTTP/1.1 only）。
      # 主站 443 保持 HTTP/2 多路复用稳定，wss 升级走独立端口避开 nginx 1.29
      # 对 RFC 8441（HTTP/2 上的 WebSocket）兼容性问题。两边互不影响——加错
      # 8443 server 块也只影响 wss，主站不受波及。Lighthouse 防火墙需要同步
      # 开放 8443 入站。
      - "8443:8443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  postgres_data:
  uploads_data:
  orthanc_storage:
  redis_data:
